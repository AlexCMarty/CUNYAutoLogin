<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>E2E credential fixture</title>
  </head>
  <body>
    <input id="CUNYLoginUsernameDisplay" type="text" autocomplete="username" />
    <input id="CUNYLoginPassword" type="password" autocomplete="current-password" />
    <button id="submit" type="button">Sign In</button>
    <script>
      window.__e2eCredentialSubmitted = false;
      document.getElementById("submit").addEventListener("click", function () {
        window.__e2eCredentialSubmitted = true;
      });
    </script>
  </body>
</html>
