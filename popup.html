<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CUNYAutoLogin</title>
    <link rel="stylesheet" href="/src/popup/popup.css" />
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">CUNYAutoLogin</h1>
      <p id="status" class="status" role="status" aria-live="polite"></p>

      <form id="vault-form" autocomplete="off" novalidate>
        <p id="mode-hint" class="hint"></p>

        <!-- shown in setup + unlocked, hidden in locked -->
        <div id="credential-fields">
          <label class="field">
            <span>CUNY email</span>
            <input
              id="email"
              type="email"
              inputmode="email"
              autocomplete="username"
              placeholder="you@login.cuny.edu"
            />
          </label>

          <label class="field">
            <span>Password</span>
            <div class="input-wrap">
              <input
                id="password"
                type="password"
                autocomplete="current-password"
              />
              <button type="button" class="toggle-visibility" aria-label="Show password" tabindex="-1"></button>
            </div>
          </label>

          <label class="field">
            <span>TOTP secret (Base32)</span>
            <div class="input-wrap">
              <input
                id="totpSecret"
                type="password"
                autocomplete="off"
                spellcheck="false"
              />
              <button type="button" class="toggle-visibility" aria-label="Show TOTP secret" tabindex="-1"></button>
            </div>
            <p
              id="totp-secret-source-hint"
              class="hint totp-source-hint hidden"
              role="note"
            ></p>
          </label>
        </div>

        <!-- shown in setup + locked, hidden in unlocked -->
        <div id="master-password-field">
          <label class="field">
            <span id="master-label">Extension master password</span>
            <div class="input-wrap">
              <input
                id="masterPassword"
                type="password"
                autocomplete="off"
                minlength="8"
              />
              <button type="button" class="toggle-visibility" aria-label="Show master password" tabindex="-1"></button>
            </div>
          </label>
        </div>

        <!-- shown only in unlocked, hidden in setup + locked -->
        <div id="change-master-section" class="hidden">
          <p class="hint change-master-hint">
            To change your master password, fill both fields below (optional).
          </p>
          <label class="field">
            <span>New master password</span>
            <div class="input-wrap">
              <input
                id="newMasterPassword"
                type="password"
                autocomplete="new-password"
                minlength="8"
              />
              <button type="button" class="toggle-visibility" aria-label="Show new master password" tabindex="-1"></button>
            </div>
          </label>
          <label class="field">
            <span>Confirm new master password</span>
            <div class="input-wrap">
              <input
                id="confirmNewMasterPassword"
                type="password"
                autocomplete="new-password"
                minlength="8"
              />
              <button type="button" class="toggle-visibility" aria-label="Show confirm password" tabindex="-1"></button>
            </div>
          </label>
        </div>

        <button type="submit" id="submit-btn" class="primary">Save</button>
        <button type="button" id="lock-btn" class="secondary hidden">Lock vault</button>
      </form>

      <section class="dev-test" aria-label="Development test">
        <button type="button" id="test-message-btn" class="secondary">
          Send test FILL_CREDENTIALS to active tab
        </button>
      </section>
    </main>
    <script type="module" src="/src/popup/popup.ts"></script>
  </body>
</html>
