<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <div class="login-info-container">
        <div class="entry-box">
            <label for="email">Email address</label>
            <input type="email" id="name" name="name" value="@login.cuny.edu"/>
        </div>
        <div class="entry-box">
            <label for="password-initial">Password</label>
            <input type="password" id="password-initial" name="password-initial"/>
        </div>
        <div class="entry-box">
            <label for="password-confirmation">Confirm password</label>
            <input type="password" id="password" name="password-confirmation"/>
        </div>
        <div class="entry-box">
            <label for="totp">TOTP Code</label>
            <input type="text" id="totp" name="totp"/>
        </div>
        <div class="entry-box">
            <button type="submit">Submit</button>
        </div>    
    </div>
  </body>
</html>
